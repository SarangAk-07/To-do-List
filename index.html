<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo App</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <div class="container">
        <h1 class="todo-heading">To-Do List</h1>
        <form id="taskForm" class="input-box">
          <input id="taskInput" type="text" placeholder="Add a new task..." />
          <button id="sumbit-btn" type="submit">+ Add</button>
        </form>
        <section class="tasks">
          <h3>Today's Tasks</h3>
          <ul id="taskList" class="task-list">
            <!-- <li>
              <button class="done-btn">Done</button>
              <span class="task-text">Sample Task</span>
              <button class="delete-btn done-btn">Delete</button>
            </li> -->
          </ul>
          <!-- <p id="emptyMsg">No tasks yet</p> -->
        </section>
      </div>
    </main>
    <script src="script.js"></script>
  </body>
</html>
